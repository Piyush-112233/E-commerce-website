<div class="category-container">

    <h2 class="title">Category Management</h2>

    <!-- Add / Update Category Form -->
    <div class="form-card">
        <form [formGroup]="categoryForm" (ngSubmit)="saveCategory()">

            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="name" formControlName="name" placeholder="Enter category name" required />
            </div>

            <div class="btn-group">
                <button type="submit" class="btn add-btn">
                    {{selectedCategoryId ? 'Update Category' : 'Add Category'}}
                    <!-- Add Category -->
                </button>

                <button type="button" class="btn cancel-btn" (click)="resetForm()">
                    Cancel
                </button>
            </div>

        </form>
    </div>


    <!-- Category Table -->
    <div class="table-card">

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Category Name</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                @for(cat of categories; track $index){

                <tr>
                    <td>{{$index + 1}}</td>
                    <td>{{cat.name}}</td>

                    <td class="actions">

                        <button class="btn edit-btn" (click)="editCategory(cat)">
                            Edit
                        </button>

                        <button class="btn delete-btn" (click)="deleteCategory(cat._id)">
                            Delete
                        </button>

                    </td>
                </tr>

                }

            </tbody>

        </table>

    </div>

</div>
