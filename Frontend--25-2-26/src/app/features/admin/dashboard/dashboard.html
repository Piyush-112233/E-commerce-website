<div class="admin-shell">

  <!-- Admin top bar -->
  <header class="admin-topbar">
    <div class="admin-topbar-brand">
      <span class="admin-brand-icon">⚙️</span>
      <span class="admin-brand-name">Admin Dashboard</span>
    </div>

    <nav class="admin-topbar-nav">
      <a routerLink="categories" class="admin-nav-link">
        <span class="material-icons">category</span>
        Categories
      </a>
      <a routerLink="products" class="admin-nav-link">
        <span class="material-icons">inventory_2</span>
        Products
      </a>
      <a routerLink="chat" class="admin-nav-link">
        <span class="material-icons">support_agent</span>
        Chats
      </a>

      <button type="button" class="admin-logout-btn" (click)="logout()" id="admin-logout-btn">
        <span class="material-icons">logout</span>
        Logout
      </button>
    </nav>
  </header>

  <!-- Child route content -->
  <main class="admin-content">
    <router-outlet></router-outlet>
  </main>

</div>
