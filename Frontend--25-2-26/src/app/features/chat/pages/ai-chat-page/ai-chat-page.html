<div class="ai-chat-container">
    <div class="ai-chat-header">
        <h3>MastersUnion AI Assistant</h3>
    </div>

    <div class="ai-chat-messages">
        @for (msg of aiChatService.messages(); track $index) {
        <!-- <div class="message-bubble" [class.human]="msg.role === 'human'" [class.ai]="msg.role === 'ai'">
            {{ msg.content }}
        </div> -->
        <div class="message-bubble" [class.human]="msg.role === 'human'" [class.ai]="msg.role === 'ai'">
            @if (msg.role === 'human') {
            {{ msg.content }}
            } @else {
                If you want the **bold** text to actually be bold, and you want real bullet points
            <markdown [data]="msg.content"></markdown>
            }
        </div>
        }
        @if (aiChatService.isStreaming()) {
        <div class="typing-indicator">AI is typing...</div>
        }
    </div>
    <div class="ai-chat-input">
        <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Ask me anything..."
            [disabled]="aiChatService.isStreaming()" />
        <button (click)="sendMessage()" [disabled]="aiChatService.isStreaming() || !userInput.trim()">
            Send
        </button>
    </div>
</div>
