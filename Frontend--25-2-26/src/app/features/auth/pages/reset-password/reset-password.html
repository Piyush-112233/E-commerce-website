<div class="reset-container">
    <div class="reset-card">

        <h2>Reset Password</h2>
        <p>Enter your new password below</p>

        <form [formGroup]="resetForm" (ngSubmit)="resetPassword()">

            <input type="password" placeholder="New Password" formControlName="password" />
            <input type="password" placeholder="Confirm Password" formControlName="confirmPassword" />
            <div class="password-rules">

                @let password = resetForm.get('password');

                <small [class.valid]="!password?.errors?.['required'] && password?.touched">
                    Password is required
                </small>

                <small [class.valid]="!password?.errors?.['minlength'] && password?.touched">
                    Minimum 5 characters required
                </small>

                <small [class.valid]="!password?.errors?.['specialChar'] && password?.touched">
                    Must contain a special character
                </small>

                <small [class.valid]="!password?.errors?.['uppercase'] && password?.touched">
                    Must contain an uppercase letter
                </small>

            </div>

            <button type="submit">Reset Password</button>

        </form>

        <div class="back-login">
            <a routerLink="/auth/login">Back to Login</a>
        </div>

    </div>
</div>
